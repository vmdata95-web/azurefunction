version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satkon_backend
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=Sat_Kon7;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
      - ConnectionStrings__RedisConnection=redis:6379
      - VideoProcessing__FFmpegPath=ffmpeg
      - VideoProcessing__FFprobePath=ffprobe
      - AzureStorage__ConnectionString=${AZURE_STORAGE_CONNECTION_STRING}
      - AzureStorage__ContainerName=documents
      - Jwt__Key=VeryStrongSecretKey_MustBeAtLeast32BytesLong
      - Jwt__Issuer=YourIssuer
      - Jwt__Audience=YourAudience
      - Jwt__ExpiresMinutes=60
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    volumes:
      - temp-media:/tmp/VideoProcessing

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: satkon_db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: satkon_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:alpine
    container_name: satkon_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  temp-media:
  db-data:
  redis-data:
