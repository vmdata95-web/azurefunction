server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────────────────────────────
    # Root directory — where your SPA build files (index.html, JS, CSS)
    # are placed inside the Nginx container.
    # ─────────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────
    # SPA FALLBACK — THE CORE FIX
    #
    # try_files checks in order:
    #   $uri       → serves the exact file if it exists (e.g. /logo.png)
    #   $uri/      → serves as a directory if it exists
    #   /index.html → fallback: serve index.html for ALL unknown routes
    #
    # This means /dashboard, /profile, /settings — any SPA route —
    # all receive index.html, and the React/Vue/Angular router takes over.
    # ─────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────────────
    # API Proxy → forwards /api/* to the .NET backend (Sat_Kon)
    # 
    # If your frontend calls /api/events, /api/auth etc., this block
    # forwards them to your ASP.NET Core backend running on port 80.
    #
    # In Docker Compose, use the service name (e.g. "backend").
    # In a single-container setup, use 127.0.0.1 with the backend port.
    # ─────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─────────────────────────────────────────────────────────────────
    # SignalR WebSocket Proxy
    #
    # Your backend uses /chatHub and /streamHub for SignalR.
    # WebSocket connections require specific proxy headers to upgrade
    # from HTTP → WS protocol correctly.
    # ─────────────────────────────────────────────────────────────────
    location ~ ^/(chatHub|streamHub) {
        proxy_pass         http://backend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # Keep long-lived WebSocket connections alive
    }

    # ─────────────────────────────────────────────────────────────────
    # Swagger UI (proxy to .NET backend swagger)
    # ─────────────────────────────────────────────────────────────────
    location /swagger/ {
        proxy_pass         http://backend:80/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────
    # Static Asset Caching
    #
    # SPA build tools (Vite/Webpack) generate hashed filenames like
    # main.a3f2d1.js — these never change content, so we cache
    # them for 1 year with "immutable" for maximum performance.
    # ─────────────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header X-XSS-Protection      "1; mode=block"                   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────────────────
    # Gzip Compression — reduces transfer size for text assets
    # ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
